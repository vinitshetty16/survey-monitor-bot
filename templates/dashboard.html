<!DOCTYPE html>
<html>

<head>

<title>Survey Bot Control Center</title>

<style>

body{
background:#0b0f1a;
font-family:Arial;
color:white;
text-align:center;
}

h1{
color:#00ffe7;
}

.panel{
background:#12182b;
border-radius:10px;
padding:25px;
margin:20px auto;
width:500px;
}

button{
padding:15px 40px;
font-size:18px;
margin:10px;
border:none;
border-radius:6px;
}

.start{
background:#00ff9d;
}

.pause{
background:#ff3d5a;
color:white;
}

#status-box{
margin-top:20px;
text-align:left;
}

.log{
padding:8px;
}

.green{
color:#00ff9d;
}

.red{
color:#ff3d5a;
}

.orange{
color:#ffb347;
}

</style>

</head>

<body>

<h1>Survey Bot Control Center</h1>

<div class="panel">

Status:
{% if running %}
<span class="green">RUNNING</span>
{% else %}
<span class="red">PAUSED</span>
{% endif %}

<br><br>

<a href="/start">
<button class="start">Start Bot</button>
</a>

<a href="/pause">
<button class="pause">Pause Bot</button>
</a>

</div>

<div class="panel">

<h2>Activity Log</h2>

<div id="status-box"></div>

</div>

<script>

async function loadStatus(){

const res = await fetch("/status")
const data = await res.json()

const box = document.getElementById("status-box")

box.innerHTML=""

data.logs.forEach(log=>{

const row=document.createElement("div")

row.className="log "+log.color

row.innerHTML=`[${log.time}] ${log.message}`

box.appendChild(row)

})

}

setInterval(loadStatus,5000)

loadStatus()

</script>

</body>

</html>
